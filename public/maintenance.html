<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>loica</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    background: #faf9f7;
    color: #1c1612;
  }
  .container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  .logo {
    height: 80px;
    width: auto;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .title { font-size: 0.9rem; font-weight: 600; }
  .subtitle { font-size: 0.75rem; opacity: 0.5; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="container">
  <img src="/loica-logo.png" alt="loica" class="logo">
  <p class="title">Updating, please wait...</p>
  <p class="subtitle">This page will reload automatically</p>
</div>
<script>
  (function poll() {
    setTimeout(function() {
      fetch('/api/health', { cache: 'no-store' })
        .then(function(r) { if (r.ok) window.location.reload(); else poll(); })
        .catch(poll);
    }, 3000);
  })();
</script>
</body>
</html>
